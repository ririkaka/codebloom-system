<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Admin - CodeBloom</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #eee; }
    .correct { color: green; font-weight: bold; }
    .wrong { color: red; font-weight: bold; }
    button { padding: 8px 12px; margin-bottom: 10px; }
  </style>
</head>
<body>

<h2>📊 Trang quản trị (Admin)</h2>
<button onclick="logout()">Đăng xuất</button>

<table>
  <thead id="tableHead"></thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
  // 🔥 QUAN TRỌNG: dùng cùng API cho mọi trang
  const API_BASE = "https://codebloom-system.onrender.com";
  const token = localStorage.getItem("teacher_token");

  if (!token) {
    alert("🔒 Phiên đăng nhập đã hết hạn!");
    window.location.href = "teacher-login.html";
  }

  let allQuestions = [];
  let studentMap = {};
  let questionMap = {};

  async function loadResults() {
    try {
      const [resResults, resStudents, resQuestions] = await Promise.all([
        fetch(`${API_BASE}/results`, {
          headers: { Authorization: `Bearer ${token}` }
        }),
        fetch(`${API_BASE}/students`, {
          headers: { Authorization: `Bearer ${token}` }
        }),
        fetch(`${API_BASE}/questions`)
      ]);

      // 👉 xử lý lỗi token
      if (resResults.status === 401 || resStudents.status === 401) {
        alert("⚠️ Phiên đăng nhập đã hết hạn!");
        localStorage.removeItem("teacher_token");
        window.location.href = "teacher-login.html";
        return;
      }

      const results = await resResults.json();
      const students = await resStudents.json();
      const questions = await resQuestions.json();

      // 👉 fix lỗi students.forEach is not a function
      if (!Array.isArray(students)) {
        alert("🚫 API /students trả về sai dữ liệu!");
        console.error(students);
        return;
      }

      if (!Array.isArray(results)) {
        alert("🚫 API /results trả về sai dữ liệu!");
        console.error(results);
        return;
      }

      // map student
      students.forEach(s => {
        studentMap[s.student_id] = s.name || "Chưa rõ";
      });

      // map question -> level
      questions.forEach(q => {
        questionMap[q.question_id] = q.level;
      });

      allQuestions = [...new Set(results.map(r => r.question_id))].sort();

      renderTable(results);

    } catch (err) {
      console.error(err);
      alert("🚫 Không kết nối được server!");
    }
  }

  function renderTable(results) {
    const head = document.getElementById("tableHead");
    const body = document.getElementById("tableBody");

    const bloomLevels = ["Nhận biết", "Thông hiểu", "Vận dụng", "Phân tích"];

    head.innerHTML = `
      <tr>
        <th>Mã SV</th>
        <th>Họ tên</th>
        ${allQuestions.map(q => `<th>Câu ${q}</th>`).join("")}
        <th>Đúng</th>
        <th>Sai</th>
        ${bloomLevels.map(l => `<th>${l}</th>`).join("")}
        <th>Phiên</th>
      </tr>
    `;

    body.innerHTML = "";

    const grouped = {};

    results.forEach(r => {
      if (!grouped[r.student_id]) grouped[r.student_id] = {};
      if (!grouped[r.student_id][r.session_id]) grouped[r.student_id][r.session_id] = [];
      grouped[r.student_id][r.session_id].push(r);
    });

    window.sessionDataByStudent = grouped;

    Object.entries(grouped).forEach(([student_id, sessions]) => {
      const sessionIds = Object.keys(sessions).sort();
      const latest = sessionIds[sessionIds.length - 1];

      const row = document.createElement("tr");
      row.dataset.studentId = student_id;
      document.getElementById("tableBody").appendChild(row);

      renderSessionRow(student_id, latest, row, sessions);
    });
  }

  function renderSessionRow(student_id, session_id, row, sessions) {
    const answers = sessions[session_id];
    const answerMap = {};

    answers.forEach(a => {
      answerMap[a.question_id] = a.correct;
    });

    const correct = answers.filter(a => a.correct === true).length;
    const wrong = answers.filter(a => a.correct === false).length;

    const bloomStats = {
      "Nhận biết": 0,
      "Thông hiểu": 0,
      "Vận dụng": 0,
      "Phân tích": 0
    };

    answers.forEach(a => {
      const level = questionMap[a.question_id];
      if (a.correct && bloomStats[level] !== undefined) {
        bloomStats[level]++;
      }
    });

    row.innerHTML = `
      <td>${student_id}</td>
      <td>${studentMap[student_id] || "Chưa rõ"}</td>

      ${allQuestions.map(q => {
        const val = answerMap[q];
        return val === true
          ? `<td class="correct">✅</td>`
          : val === false
            ? `<td class="wrong">❌</td>`
            : `<td></td>`;
      }).join("")}

      <td>${correct}</td>
      <td>${wrong}</td>

      <td>${bloomStats["Nhận biết"]}</td>
      <td>${bloomStats["Thông hiểu"]}</td>
      <td>${bloomStats["Vận dụng"]}</td>
      <td>${bloomStats["Phân tích"]}</td>

      <td>
        <select onchange="changeSession('${student_id}', this.value)">
          ${Object.keys(sessions)
            .map(id => `<option value="${id}" ${id === session_id ? "selected" : ""}>${id}</option>`)
            .join("")}
        </select>
      </td>
    `;
  }

  function changeSession(student_id, session_id) {
    const row = document.querySelector(`tr[data-student-id="${student_id}"]`);
    const sessions = window.sessionDataByStudent[student_id];
    renderSessionRow(student_id, session_id, row, sessions);
  }

  function logout() {
    localStorage.removeItem("teacher_token");
    window.location.href = "teacher-login.html";
  }

  loadResults();
</script>

</body>
</html>
