<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng điều khiển Giáo viên - CodeBloom</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        h2 { color: #333; margin: 0; font-size: 24px; }
        .btn-logout { background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-logout:hover { background: #c82333; transform: translateY(-2px); }

        /* Table Styles */
        .table-wrapper { overflow-x: auto; margin-top: 20px; border: 1px solid #dee2e6; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 1000px; }
        th { background-color: #f8f9fa; color: #444; padding: 15px; border: 1px solid #dee2e6; text-align: center; sticky: top; }
        td { padding: 12px; border: 1px solid #dee2e6; text-align: center; }
        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #f1f7ff; }

        /* Evaluation Table Specific */
        .eval-scroll { max-height: 350px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 8px; }
        .status-ok { color: var(--success); font-weight: bold; font-size: 18px; }
        .status-no { color: var(--danger); font-weight: bold; font-size: 18px; }
        select { padding: 6px; border-radius: 5px; border: 1px solid var(--primary); outline: none; background: white; cursor: pointer; }

        .section-title { margin-top: 40px; margin-bottom: 15px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2><i class="fas fa-user-shield"></i> HỆ THỐNG QUẢN TRỊ CODEBLOOM</h2>
        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
    </div>

    <h3 class="section-title"><i class="fas fa-table"></i> KẾT QUẢ HỌC SINH CHI TIẾT</h3>
    <div class="table-wrapper">
        <table id="main-table">
            <thead>
                <tr id="header-row">
                    <th>Mã SV</th>
                    <th>Họ tên</th>
                    <th>Đúng</th>
                    <th>Sai</th>
                    <th>Phiên bài làm</th>
                </tr>
            </thead>
            <tbody id="data-body">
                </tbody>
        </table>
    </div>

    <h3 class="section-title"><i class="fas fa-chart-line"></i> ĐÁNH GIÁ MỨC ĐỘ NHẬN THỨC (Phiên cuối)</h3>
    <div class="eval-scroll">
        <table>
            <thead>
                <tr style="background: #e9ecef;">
                    <th style="width: 30%;">Mức độ nhận thức</th>
                    <th style="width: 20%;">Số lượng HSSV</th>
                    <th style="width: 50%;">Danh sách HSSV đạt</th>
                </tr>
            </thead>
            <tbody id="evaluation-body">
                </tbody>
        </table>
    </div>
</div>

<script src="admin.js"></script>
</body>
</html>
