<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Kết quả học sinh</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }

    th {
      background: #eee;
    }

    .correct { color: green; font-weight: bold; }
    .wrong { color: red; font-weight: bold; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    button {
      background: red;
      color: white;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="top-bar">
  <h2>📊 KẾT QUẢ HỌC SINH (Phiên mới nhất)</h2>
  <button onclick="logout()">Đăng xuất</button>
</div>

<table>
  <thead id="tableHead"></thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
const API_BASE = "https://codebloom-system.onrender.com"; // 🔥 sửa đúng domain

const token = localStorage.getItem("teacher_token");

if (!token) {
  alert("🔒 Bạn chưa đăng nhập");
  window.location.href = "teacher-login.html";
}

let allResults = [];
let studentMap = {};
let questionMap = {};
let allQuestions = [];

async function loadResults() {
  try {
    const [resultsRes, studentsRes, questionsRes] = await Promise.all([
      fetch(`${API_BASE}/results`, {
        headers: { Authorization: `Bearer ${token}` }
      }),
      fetch(`${API_BASE}/students`, {
        headers: { Authorization: `Bearer ${token}` }
      }),
      fetch(`${API_BASE}/questions`)
    ]);

    const results = await resultsRes.json();
    const students = await studentsRes.json();
    const questions = await questionsRes.json();

    // map student
    students.forEach(s => {
      studentMap[s.student_id] = s.name;
    });

    // map question
    questions.forEach(q => {
      questionMap[q.question_id] = q.level;
    });

    allResults = results;
    allQuestions = [...new Set(results.map(r => r.question_id))].sort();

    renderTable(results);

  } catch (err) {
    console.error(err);
    alert("🚫 Lỗi tải dữ liệu");
  }
}

function renderTable(results) {
  const head = document.getElementById("tableHead");
  const body = document.getElementById("tableBody");

  head.innerHTML = `
    <tr>
      <th>Mã SV</th>
      <th>Họ tên</th>
      ${allQuestions.map(q => `<th>${q}</th>`).join("")}
      <th>Đúng</th>
      <th>Sai</th>
      <th>Phiên</th>
    </tr>
  `;

  body.innerHTML = "";

  const grouped = {};

  results.forEach(r => {
    if (!grouped[r.student_id]) grouped[r.student_id] = {};
    if (!grouped[r.student_id][r.session_id]) grouped[r.student_id][r.session_id] = [];
    grouped[r.student_id][r.session_id].push(r);
  });

  window.sessionData = grouped;

  Object.keys(grouped).forEach(student_id => {
    const sessions = grouped[student_id];
    const sessionIds = Object.keys(sessions).sort();
    const latest = sessionIds[sessionIds.length - 1];

    const row = document.createElement("tr");
    row.dataset.studentId = student_id;

    renderRow(student_id, latest, row, sessions);

    body.appendChild(row);
  });
}

function renderRow(student_id, session_id, row, sessions) {
  const answers = sessions[session_id];

  let answerMap = {};
  answers.forEach(a => {
    answerMap[a.question_id] = a.correct;
  });

  const correct = answers.filter(a => a.correct).length;
  const wrong = answers.filter(a => !a.correct).length;

  row.innerHTML = `
    <td>${student_id}</td>
    <td>${studentMap[student_id] || "Chưa rõ"}</td>

    ${allQuestions.map(q => {
      const val = answerMap[q];
      return val === true
        ? `<td class="correct">✔</td>`
        : val === false
          ? `<td class="wrong">✖</td>`
          : `<td></td>`;
    }).join("")}

    <td>${correct}</td>
    <td>${wrong}</td>

    <td>
      <select onchange="changeSession('${student_id}', this.value)">
        ${Object.keys(sessions).map(id =>
          `<option value="${id}" ${id === session_id ? "selected" : ""}>${id}</option>`
        ).join("")}
      </select>
    </td>
  `;
}

function changeSession(student_id, session_id) {
  const row = document.querySelector(`tr[data-student-id="${student_id}"]`);
  renderRow(student_id, session_id, row, window.sessionData[student_id]);
}

function logout() {
  localStorage.removeItem("teacher_token");
  window.location.href = "teacher-login.html";
}

loadResults();
</script>

</body>
</html>
