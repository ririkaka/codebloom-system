<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Bảng kết quả học sinh - CodeBloom</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f7f7f7;
    }
    h2 {
      text-align: center;
      margin-bottom: 25px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }
    th {
      background: #efefef;
    }
    .correct {
      color: green;
      font-weight: bold;
    }
    .wrong {
      color: red;
      font-weight: bold;
    }
    select {
      padding: 4px;
      border-radius: 4px;
    }
    .logout-btn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      float: right;
      margin-bottom: 10px;
    }
    .logout-btn:hover {
      background: #b52a35;
    }
  </style>
</head>
<body>

  <button class="logout-btn" onclick="logout()">Đăng xuất</button>
  <h2>📊 KẾT QUẢ HỌC SINH (Phiên mới nhất)</h2>

  <table id="resultsTable">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>

  <script>
    const API_BASE = ""; // dùng đường dẫn gốc cùng host (localhost:5000)
    const token = localStorage.getItem("teacher_token");

    if (!token) {
      alert("🔒 Bạn chưa đăng nhập. Chuyển hướng về trang đăng nhập...");
      window.location.href = "teacher-login.html";
    }

    let allResults = [];
    let allQuestions = [];
    let studentMap = {};

    async function loadResults() {
      try {
        const [resultsRes, studentsRes] = await Promise.all([
          fetch(`${API_BASE}/results`, {
            headers: { Authorization: `Bearer ${token}` },
          }),
          fetch(`${API_BASE}/students`, {
            headers: { Authorization: `Bearer ${token}` },
          }),
        ]);

        if (!resultsRes.ok || !studentsRes.ok) {
          throw new Error("Không thể tải dữ liệu");
        }

        const results = await resultsRes.json();
        const students = await studentsRes.json();

        // Map student_id -> name
        students.forEach(st => {
          studentMap[st.student_id] = st.name || "Chưa rõ";
        });

        allResults = results;
        allQuestions = [...new Set(results.map(r => r.question_id))].sort();

        renderTable(results);
      } catch (err) {
        console.error(err);
        alert("🚫 Không thể kết nối máy chủ hoặc tải dữ liệu.");
      }
    }

    function renderTable(results) {
      const head = document.getElementById("tableHead");
      const body = document.getElementById("tableBody");
      head.innerHTML = `
        <tr>
          <th>Mã SV</th>
          <th>Họ tên</th>
          ${allQuestions.map(q => `<th>Câu ${q}</th>`).join("")}
          <th>Đúng</th>
          <th>Sai</th>
          <th>Phiên</th>
        </tr>
      `;
      body.innerHTML = "";

      // Gom theo sinh viên → các phiên làm bài
      const grouped = {};
      for (const r of results) {
        const sid = r.student_id;
        if (!grouped[sid]) grouped[sid] = {};
        if (!grouped[sid][r.session_id]) grouped[sid][r.session_id] = [];
        grouped[sid][r.session_id].push(r);
      }

      window.sessionDataByStudent = grouped;

      Object.entries(grouped).forEach(([student_id, sessions]) => {
        const sessionIds = Object.keys(sessions).sort();
        const latestSession = sessionIds[sessionIds.length - 1];

        const row = document.createElement("tr");
        row.dataset.studentId = student_id;
        body.appendChild(row);

        renderSessionRow(student_id, latestSession, row, sessions);
      });
    }

    function renderSessionRow(student_id, session_id, row, sessions) {
      const answers = sessions[session_id];
      const answerMap = {};
      answers.forEach(ans => answerMap[ans.question_id] = ans.correct);

      const correct = answers.filter(a => a.correct === true).length;
      const wrong = answers.filter(a => a.correct === false).length;

      row.innerHTML = `
        <td>${student_id}</td>
        <td>${studentMap[student_id] || "Chưa rõ"}</td>
        ${allQuestions.map(qid => {
          const val = answerMap[qid];
          return val === true
            ? `<td class="correct">✅</td>`
            : val === false
              ? `<td class="wrong">❌</td>`
              : `<td></td>`;
        }).join("")}
        <td>${correct}</td>
        <td>${wrong}</td>
        <td>
          <select onchange="changeSession('${student_id}', this.value)">
            ${Object.keys(sessions)
              .map(id => `<option value="${id}" ${id === session_id ? "selected" : ""}>${id}</option>`)
              .join("")}
          </select>
        </td>
      `;
    }

    function changeSession(student_id, session_id) {
      const row = document.querySelector(`tr[data-student-id="${student_id}"]`);
      const sessions = window.sessionDataByStudent[student_id];
      renderSessionRow(student_id, session_id, row, sessions);
    }

    function logout() {
      localStorage.removeItem("teacher_token");
      alert("Đã đăng xuất!");
      window.location.href = "role-select.html";
    }

    loadResults();
  </script>

</body>
</html>
