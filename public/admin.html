<script>
    // Tự động nhận diện URL
    const isLocal = window.location.hostname === "localhost";
    const API_BASE = isLocal ? "http://localhost:5000" : "https://codebloom-system.onrender.com";

    async function loadAdminData() {
        try {
            // QUAN TRỌNG: Thêm /api/ vào trước results và students
            const [resResults, resStudents] = await Promise.all([
                fetch(`${API_BASE}/api/results`),
                fetch(`${API_BASE}/api/students`)
            ]);

            if (!resResults.ok || !resStudents.ok) throw new Error("Server error");

            const results = await resResults.json();
            const students = await resStudents.json();
            renderTable(results, students);
        } catch (err) {
            console.error(err);
            alert("Lỗi: Server chưa sẵn sàng hoặc sai đường dẫn API!");
        }
    }

    function renderTable(results, students) {

        const tableBody = document.getElementById('tableBody');
        // ... code render bảng của bạn ...
    }

    loadAdminData();
</script>
