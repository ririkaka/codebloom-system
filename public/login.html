<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Học sinh - CodeBloom</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4e73df;
            --bg: #f8f9fc;
            --white: #ffffff;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #4e73df 10%, #224abe 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .login-card {
            background: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 1rem 3rem rgba(0,0,0,0.175);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #4e73df; }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d3e2;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #4e73df;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-login:hover { background: #2e59d9; }
        #error-msg { color: #e74a3b; margin-top: 15px; display: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 style="color: #3a3b45;">Học sinh Đăng nhập</h2>
    <form id="login-form">
        <div class="input-group">
            <label>Mã số học sinh</label>
            <input type="text" id="student_id" placeholder="Ví dụ: 002" required>
        </div>
        <div class="input-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="********" required>
        </div>
        <button type="submit" class="btn-login">ĐĂNG NHẬP</button>
    </form>
    <p id="error-msg"></p>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorMsg = document.getElementById('error-msg');
        errorMsg.style.display = 'none';

        const student_id = document.getElementById('student_id').value;
        const password = document.getElementById('password').value;

        try {
            // Gửi yêu cầu đến API login trên Render
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Lưu token và thông tin vào máy để làm bài
                localStorage.setItem('student_token', data.token);
                localStorage.setItem('student_id', student_id);
                localStorage.setItem('student_name', data.name);
                
                // Chuyển hướng đến trang làm bài
                window.location.href = 'index.html';
            } else {
                errorMsg.innerText = data.message || 'Đăng nhập thất bại!';
                errorMsg.style.display = 'block';
            }
        } catch (error) {
            errorMsg.innerText = 'Lỗi kết nối server!';
            errorMsg.style.display = 'block';
        }
    });
</script>
</body>
</html>
