<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Học sinh - CodeBloom</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #ffffff; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #1c1e21; margin-bottom: 1.5rem; font-size: 26px; }
        .input-group { text-align: left; margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #4b4f56; }
        input { width: 100%; padding: 12px 15px; border: 1px solid #dddfe2; border-radius: 8px; font-size: 16px; box-sizing: border-box; transition: 0.3s; background: #f5f6f7; }
        input:focus { border-color: #1877f2; outline: none; background: #fff; box-shadow: 0 0 0 2px rgba(24,119,242,0.2); }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #e4e6eb; color: #bcc0c4; cursor: not-allowed; }
        #message { margin-top: 15px; padding: 10px; border-radius: 8px; display: none; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
        .error-msg { background-color: #ffebe9; color: #d93025; border: 1px solid #ffc1c0; display: flex !important; }
        .back-link { display: block; margin-top: 20px; color: #1877f2; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🎓 Đăng nhập Học sinh</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>Mã học sinh</label>
                <input type="text" id="student_id" placeholder="Nhập mã học sinh (Ví dụ: 002)" required>
            </div>
            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="••••••" required>
            </div>
            <button type="submit" id="loginBtn">Đăng nhập</button>
        </form>
        <div id="message"></div>
        <a href="role-select.html" class="back-link">← Quay lại chọn vai trò</a>
    </div>

    <script>
        document.getElementById("loginForm").onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById("loginBtn");
            const msgDiv = document.getElementById("message");
            const student_id = document.getElementById("student_id").value.trim();
            const password = document.getElementById("password").value;

            msgDiv.className = "";
            msgDiv.style.display = "none";
            btn.disabled = true;
            btn.innerText = "Đang xác thực...";

            try {
                const res = await fetch('/api/login', {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ student_id, password })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem("student_token", data.token);
                    localStorage.setItem("student_id", data.student_id);
                    window.location.href = "index.html";
                } else {
                    msgDiv.className = "error-msg";
                    msgDiv.innerHTML = `<i class="fas fa-times-circle"></i> ${data.error}`;
                    btn.disabled = false;
                    btn.innerText = "Đăng nhập";
                }
            } catch (err) {
                msgDiv.className = "error-msg";
                msgDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Lỗi kết nối Server.`;
                btn.disabled = false;
                btn.innerText = "Đăng nhập";
            }
        };
    </script>
</body>
</html>
