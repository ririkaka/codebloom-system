<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Học sinh - CodeBloom</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        h2 {
            margin-bottom: 25px;
            color: #2c3e50;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #666;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #007bff;
            outline: none;
        }
        button {
            width: 100%;
            padding: 13px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #007bff;
            text-decoration: none;
            font-size: 14px;
        }
        #message {
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>🎓 Đăng nhập Học sinh</h2>
    <form id="loginForm">
        <div class="input-group">
            <label for="student_id">Mã học sinh</label>
            <input type="text" id="student_id" placeholder="Ví dụ: 001" required />
        </div>
        
        <div class="input-group">
            <label for="password">Mật khẩu</label>
            <input type="password" id="password" placeholder="••••••••" required />
        </div>
        
        <button type="submit" id="loginBtn">Đăng nhập</button>
    </form>
    
    <div id="message"></div>
    
    <a href="role-select.html" class="back-link">← Quay lại chọn vai trò</a>
</div>

<script>
    // Tự động lấy origin của Render (ví dụ: https://codebloom-system.onrender.com)
    const API_BASE = window.location.origin;

    document.getElementById("loginForm").onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById("loginBtn");
        const msgDiv = document.getElementById("message");
        
        const student_id = document.getElementById("student_id").value.trim();
        const password = document.getElementById("password").value;

        btn.disabled = true;
        btn.innerText = "Đang xác thực...";
        msgDiv.innerText = "";

        try {
            // Gọi đến đúng endpoint /api/login mà chúng ta vừa thêm vào server.js
            const res = await fetch(`${API_BASE}/api/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ student_id, password })
            });

            const data = await res.json();

            if (res.ok && data.token) {
                // LƯU TRỮ QUAN TRỌNG: Để các trang sau sử dụng
                localStorage.setItem("student_token", data.token);
                localStorage.setItem("student_id", data.student_id);
                localStorage.setItem("student_name", data.name);
                localStorage.setItem("session_id", data.session_id || "PHIEN_1");

                msgDiv.style.color = "green";
                msgDiv.innerText = "✅ Đăng nhập thành công!";
                
                setTimeout(() => {
                    window.location.href = "index.html"; // Chuyển đến trang danh sách bài tập
                }, 800);
            } else {
                msgDiv.style.color = "red";
                msgDiv.innerText = "❌ " + (data.error || "Thông tin không chính xác");
                btn.disabled = false;
                btn.innerText = "Đăng nhập";
            }
        } catch (err) {
            msgDiv.style.color = "red";
            msgDiv.innerText = "⚠️ Lỗi kết nối đến Server.";
            btn.disabled = false;
            btn.innerText = "Đăng nhập";
        }
    };
</script>

</body>
</html>
