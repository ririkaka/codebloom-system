<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học sinh Đăng nhập - CodeBloom</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #4e73df; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4e73df; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #2e59d9; }
        #error-msg { color: #e74a3b; text-align: center; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎓 Học sinh Đăng nhập</h2>
    <form id="studentLoginForm">
        <input type="text" id="student_id" placeholder="Mã số học sinh (VD: 002)" required>
        <input type="password" id="password" placeholder="Mật khẩu" required>
        <button type="submit">ĐĂNG NHẬP</button>
    </form>
    <p id="error-msg"></p>
</div>

<script>
    document.getElementById('studentLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const error = document.getElementById('error-msg');
        error.style.display = 'none';

        const student_id = document.getElementById('student_id').value.trim();
        const password = document.getElementById('password').value;

        try {
            // Sử dụng đường dẫn tương đối để chạy tốt trên cả localhost:10000 và Render
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Lưu thông tin học sinh vào máy
                localStorage.setItem('student_name', data.name);
                localStorage.setItem('student_id', data.student_id);
                window.location.href = 'index.html'; 
            } else {
                error.innerText = data.message;
                error.style.display = 'block';
            }
        } catch (err) {
            error.innerText = "Lỗi kết nối server! Hãy thử lại.";
            error.style.display = 'block';
        }
    });
</script>
</body>
</html>
