<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Giáo viên - CodeBloom</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #007bff; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .error-msg { color: #dc3545; font-size: 14px; margin-top: 15px; display: none; }
    </style>
</head>
<body>
<div class="login-card">
    <h2>👩‍🏫 Đăng nhập Giáo viên</h2>
    <form id="teacherForm">
        <div class="input-group">
            <label>Tên đăng nhập</label>
            <input type="text" id="username" placeholder="Nhập tài khoản" required>
        </div>
        <div class="input-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu" required>
        </div>
        <button type="submit" class="btn-login">Đăng nhập</button>
    </form>
    <p id="msg" class="error-msg"></p>
</div>

<script>
    document.getElementById('teacherForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('msg');
        msg.style.display = 'none';

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            // Dùng đường dẫn /api/... để tự động nhận diện domain Render
            const response = await fetch('/api/teacher-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem("teacher_token", data.token);
                window.location.href = "admin.html";
            } else {
                msg.innerText = data.message;
                msg.style.display = 'block';
            }
        } catch (err) {
            msg.innerText = "Lỗi kết nối server! Hãy thử lại sau 30 giây.";
            msg.style.display = 'block';
        }
    });
</script>
</body>
</html>
