<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập Giáo viên - CodeBloom</title>

  <style>
    /* 1. Nền Gradient khớp với ảnh */
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 2. Hộp đăng nhập với bo góc lớn (25px) */
    .login-container {
      background: #f8f9fa; /* Màu xám trắng rất nhạt */
      padding: 50px 40px;
      border-radius: 25px;
      width: 100%;
      max-width: 480px; /* Độ rộng hộp rộng rãi như trong ảnh */
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      box-sizing: border-box;
    }

    /* 3. Tiêu đề với màu xanh thương hiệu */
    .title {
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      color: #1877f2;
      margin-bottom: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #333;
      font-size: 16px;
    }

    /* 4. Ô nhập liệu căn chỉnh chuẩn box-sizing */
    input {
      width: 100%;
      padding: 14px 15px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-bottom: 25px;
      font-size: 16px;
      box-sizing: border-box; /* Đảm bảo padding không làm tăng chiều rộng input */
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #1877f2;
      background-color: #fff;
    }

    /* 5. Nút bấm xanh đậm bo tròn */
    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #1877f2; /* Màu xanh đặc trưng như hình */
      color: white;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }

    button:hover {
      background-color: #166fe5;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }
  </style>
</head>

<body>

<div class="login-container">
  <div class="title"><span>👩‍🏫</span> Đăng nhập Giáo viên</div>

  <label for="username">Tên đăng nhập</label>
  <input type="text" id="username" placeholder="Nhập tên đăng nhập">

  <label for="password">Mật khẩu</label>
  <input type="password" id="password" placeholder="Nhập mật khẩu">

  <button onclick="login()" id="loginBtn">Đăng nhập</button>
</div>

<script>
const API_BASE = "https://codebloom-system.onrender.com";

async function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const loginBtn = document.getElementById("loginBtn");

  if (!username || !password) {
    alert("⚠️ Vui lòng nhập đầy đủ tên đăng nhập và mật khẩu");
    return;
  }

  // Khóa nút để tránh nhấn nhiều lần
  loginBtn.disabled = true;
  loginBtn.innerText = "Đang xử lý...";

  try {
    const res = await fetch(`${API_BASE}/teacher/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!res.ok) {
      alert("❌ " + (data.message || "Tên đăng nhập hoặc mật khẩu không đúng"));
      return;
    }

    // Lưu token đăng nhập
    localStorage.setItem("teacher_token", data.token);

    alert("✅ Đăng nhập thành công!");
    // Chuyển hướng đến trang quản trị
    window.location.href = "admin.html"; 

  } catch (err) {
    console.error("Lỗi:", err);
    alert(`🚫 Lỗi kết nối server! Vui lòng kiểm tra lại mạng hoặc đợi server Render khởi động (khoảng 30s).`);
  } finally {
    loginBtn.disabled = false;
    loginBtn.innerText = "Đăng nhập";
  }
}
</script>

</body>
</html>
