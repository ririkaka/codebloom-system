<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập Giáo viên</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: #f2f2f2;
      padding: 40px;
      border-radius: 20px;
      width: 420px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .title {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: #1877f2;
      margin-bottom: 30px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
      font-size: 16px;
    }

    input:focus {
      outline: none;
      border-color: #1877f2;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(to right, #1877f2, #0056d2);
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<div class="login-container">
  <div class="title">👩‍🏫 Đăng nhập Giáo viên</div>

  <label>Tên đăng nhập</label>
  <input type="text" id="username" placeholder="Nhập tên đăng nhập">

  <label>Mật khẩu</label>
  <input type="password" id="password" placeholder="Nhập mật khẩu">

  <button onclick="login()">Đăng nhập</button>
</div>

<script>
const API_BASE = "https://codebloom-system.onrender.com";

async function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) {
    alert("⚠️ Vui lòng nhập đầy đủ thông tin");
    return;
  }

  try {
    console.log("Đang gọi API...");

    const res = await fetch(`${API_BASE}/teacher/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    console.log("Status:", res.status);

    const text = await res.text(); // đọc raw trước
    console.log("Response:", text);

    let data;
    try {
      data = JSON.parse(text);
    } catch {
      throw new Error("Server không trả JSON hợp lệ");
    }

    if (!res.ok) {
      alert("❌ " + (data.message || "Đăng nhập thất bại"));
      return;
    }

    // Lưu token
    localStorage.setItem("teacher_token", data.token);

    alert("✅ Đăng nhập thành công!");
    window.location.href = "D:/codebloom-system/public/admin.html";

  } catch (err) {
    console.error("Lỗi:", err);

    alert(`🚫 Không kết nối được server!

Nguyên nhân có thể:
- Server Render đang sleep (đợi 30s rồi thử lại)
- Sai URL API
- Bị CORS

Chi tiết lỗi:
${err.message}`);
  }
}
</script>

</body>
</html>
