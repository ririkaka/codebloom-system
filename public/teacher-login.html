<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Giáo viên - CodeBloom</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #007bff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #007bff; margin-bottom: 1.5rem; }
        .input-group { text-align: left; margin-bottom: 1rem; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover { background-color: #0056b3; }
        #message { margin-top: 15px; font-size: 14px; min-height: 20px; }
        .error { color: #dc3545; }
        .success { color: #28a745; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>👩‍🏫 Đăng nhập Giáo viên</h2>
    <div class="input-group">
        <label>Tên đăng nhập</label>
        <input type="text" id="username" placeholder="Ví dụ: ddd">
    </div>
    <div class="input-group">
        <label>Mật khẩu</label>
        <input type="password" id="password" placeholder="Mật khẩu của bạn">
    </div>
    <button onclick="handleLogin()">Đăng nhập</button>
    <div id="message"></div>
</div>

<script>
    // Tự động nhận diện môi trường để gọi API
    const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
    const API_BASE = isLocal ? "http://localhost:5000" : "https://codebloom-system.onrender.com";

    async function handleLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const msgDiv = document.getElementById('message');

        if (!user || !pass) {
            msgDiv.innerHTML = '<span class="error">Vui lòng nhập đủ thông tin!</span>';
            return;
        }

        msgDiv.innerHTML = "Đang kiểm tra...";

        try {
            // QUAN TRỌNG: Gọi tới /api/teacher/login để server không trả về trang HTML lỗi
            const response = await fetch(`${API_BASE}/api/teacher/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });

            // Kiểm tra định dạng phản hồi
            const contentType = response.headers.get("content-type");
            if (!contentType || !contentType.includes("application/json")) {
                throw new Error("Server trả về sai định dạng (HTML thay vì JSON).");
            }

            const result = await response.json();

            if (result.success) {
                msgDiv.innerHTML = '<span class="success">Đăng nhập thành công!</span>';
                localStorage.setItem("teacher_token", result.token);
                // Chuyển hướng sang trang admin sau 1 giây
                setTimeout(() => { window.location.href = "admin.html"; }, 1000);
            } else {
                msgDiv.innerHTML = `<span class="error">${result.message || 'Sai tài khoản!'}</span>`;
            }
        } catch (error) {
            console.error("Lỗi:", error);
            msgDiv.innerHTML = `<span class="error">Không kết nối được server! (Render có thể đang sleep, thử lại sau 30s)</span>`;
        }
    }

    // Cho phép nhấn Enter để đăng nhập
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
</script>

</body>
</html>
