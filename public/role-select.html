<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chọn vai trò - CodeBloom</title>
  <style>
    /* 1. Căn giữa toàn bộ nội dung */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f2f5;
      margin: 0;
      height: 100vh; /* Chiều cao tối đa màn hình */
      display: flex;
      justify-content: center; /* Căn giữa ngang */
      align-items: center;     /* Căn giữa dọc */
    }

    /* 2. Thiết kế hộp chứa (Box) */
    .box {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 100%;
      max-width: 360px; /* Độ rộng vừa vặn như trong ảnh */
    }

    h2 {
      margin-top: 0;
      margin-bottom: 25px;
      font-size: 24px;
      color: #1c1e21;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* 3. Thiết kế nút bấm chung */
    .role-btn {
      display: flex;
      align-items: center;
      justify-content: center; /* Chữ và icon nằm giữa nút */
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      font-size: 17px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      gap: 12px;
    }

    .role-btn:active {
      transform: scale(0.98); /* Hiệu ứng nhấn nút */
    }

    /* Nút Học sinh (Màu xanh dương) */
    .student {
      background-color: #007bff;
      color: white;
    }
    .student:hover {
      background-color: #0069d9;
    }

    /* Nút Giáo viên (Màu xanh lá) */
    .teacher {
      background-color: #28a745;
      color: white;
    }
    .teacher:hover {
      background-color: #218838;
    }

    /* Icon giả lập (Emoji) */
    .icon {
      font-size: 20px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>🎓 Bạn là ai?</h2>
    
    <button class="role-btn student" onclick="location.href='login.html'">
      <span class="icon">👨‍🎓</span>
      Học sinh / Sinh viên
    </button>

    <button class="role-btn teacher" onclick="location.href='teacher-login.html'">
      <span class="icon">👩‍🏫</span>
      Giáo viên
    </button>
  </div>

</body>
</html>
