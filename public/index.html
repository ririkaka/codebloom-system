<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Làm bài - CodeBloom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #007bff; --success-color: #28a745; --danger-color: #dc3545; }
        body { background-color: #f4f7f6; font-family: 'Inter', 'Segoe UI', sans-serif; }
        
        /* Sidebar */
        .sidebar { 
            background: white; 
            height: 100vh; 
            border-right: 1px solid #dee2e6; 
            padding: 20px; 
            overflow-y: auto; 
            position: fixed; 
            width: 25%; 
            z-index: 9999; 
        }
        
        /* Main Content */
        .main-content { margin-left: 25%; padding: 30px; opacity: 0.5; pointer-events: none; transition: 0.3s; }
        .main-content.active { opacity: 1; pointer-events: auto; }

        /* Question Navigation */
        .question-item { 
            cursor: pointer; padding: 12px 15px; border: 1px solid #edf2f7; 
            margin-bottom: 8px; border-radius: 10px; transition: 0.2s; background: #fff;
            display: flex; justify-content: space-between; align-items: center;
        }
        .question-item:hover { background: #f8faff; border-color: var(--primary-color); }
        .question-item.active { border: 2px solid var(--primary-color); background: #f0f7ff; font-weight: 600; }
        
        /* Editor Area */
        #editor { 
            width: 100%; height: 480px; font-family: 'Fira Code', 'Consolas', monospace; 
            padding: 20px; border-radius: 12px; border: 1px solid #ced4da; font-size: 15px;
            background-color: #ffffff; line-height: 1.6; outline: none; resize: none;
        }
        #editor:focus { border-color: var(--primary-color); box-shadow: 0 0 0 0.2rem rgba(0,123,255,.1); }

        .timer { font-weight: 800; font-size: 1.8rem; color: var(--danger-color); text-align: right; margin-bottom: 15px; }
        #question-list { display: none; margin-top: 15px; }
        .card { border-radius: 15px; border: none; }

        /* NÚT BẮT ĐẦU SÁNG RÕ */
        #btn-start {
            background-color: #007bff !important; 
            color: white !important;
            opacity: 1 !important; 
            font-weight: 800 !important;
            border: none !important;
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.4); 
            transition: all 0.3s ease;
            position: relative;
            z-index: 10000;
            cursor: pointer !important;
            pointer-events: auto !important;
        }

        #btn-start:hover {
            background-color: #0056b3 !important;
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(0, 123, 255, 0.5);
        }

        #btn-start:disabled {
            background-color: #adb5bd !important;
            opacity: 0.6 !important;
            cursor: not-allowed !important;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 p-0">
            <div class="sidebar shadow-sm">
                <h5 class="fw-bold text-primary mb-4">🧠 CODEBLOOM WORKSPACE</h5>
                
                <div class="p-3 bg-light rounded-3 mb-4">
                    <label class="form-label small fw-bold text-uppercase">Mã phiên làm việc:</label>
                    <div class="input-group mb-2">
                        <input type="text" id="session_id" class="form-control fw-bold" readonly style="background-color: #fff;">
                        <button class="btn btn-primary" id="btn-start" onclick="startExam()">Bắt đầu</button>
                    </div>
                    <div id="student-info" class="small text-muted fw-semibold">Đang xác thực...</div>
                </div>
                
                <div id="question-list-container">
                    <h6 class="text-secondary fw-bold small text-uppercase">Danh sách câu hỏi</h6>
                    <div id="question-list"></div>
                </div>
            </div>
        </div>

        <div class="col-md-9 main-content" id="exam-area">
            <div class="timer">⏳ <span id="time-left">30:00</span></div>
            
            <div class="card shadow-sm">
                <div class="card-header bg-white py-3 border-bottom">
                    <h5 class="mb-0 text-dark" id="display-question-title">Nhấn "Bắt đầu" để hiển thị đề bài</h5>
                </div>
                <div class="card-body p-4">
                    <textarea id="editor" spellcheck="false" placeholder="// Nhập code C++ của bạn tại đây..."></textarea>
                    
                    <div class="mt-4 d-flex justify-content-between align-items-center">
                        <button class="btn btn-outline-success btn-lg px-4" onclick="markAsDone()">
                            <i class="fas fa-check-circle"></i> Xác nhận xong câu này
                        </button>
                        <button class="btn btn-danger btn-lg px-5 shadow" onclick="submitAll()">
                            NỘP BÀI TẤT CẢ
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let questions = [];
    let currentQuestionId = null;
    let studentAnswers = {}; 
    let timeLeft = 30 * 60; 
    let timerInterval;

    const studentId = localStorage.getItem('student_id') || "HS001";
    const studentName = localStorage.getItem('student_name') || "Học sinh";

    async function initSession() {
        document.getElementById('student-info').innerText = `Học sinh: ${studentName} (${studentId})`;
        
        const startBtn = document.getElementById('btn-start');
        startBtn.disabled = false;

        try {
            const res = await fetch(`/api/admin/results`);
            const allResults = await res.json();
            
            // Lọc các phiên đã làm dựa trên studentId
            const userSessions = [...new Set(allResults
                .filter(r => r.student_id === studentId)
                .map(r => r.session_id))];
            
            // Chuyển đổi tên hiển thị sang PHIÊN
            const nextSessionNum = userSessions.length + 1;
            document.getElementById('session_id').value = `PHIÊN_${nextSessionNum.toString().padStart(3, '0')}`;
        } catch (err) {
            document.getElementById('session_id').value = `PHIÊN_001`;
        }
    }

    async function startExam() {
        try {
            const res = await fetch('/api/questions');
            questions = await res.json();
            
            if (questions.length === 0) {
                alert("Không tìm thấy dữ liệu câu hỏi.");
                return;
            }

            renderQuestionList();
            document.getElementById('question-list').style.display = 'block';
            document.getElementById('exam-area').classList.add('active');
            document.getElementById('btn-start').disabled = true;
            
            startTimer();
            selectQuestion(questions[0].question_id);
            
        } catch (err) {
            alert("Lỗi kết nối máy chủ khi tải đề!");
        }
    }

    function renderQuestionList() {
        const listDiv = document.getElementById('question-list');
        listDiv.innerHTML = questions.map(q => `
            <div class="question-item shadow-sm" id="item-${q.question_id}" onclick="selectQuestion('${q.question_id}')">
                <span><span class="text-primary fw-bold">#</span> ${q.question_id}</span>
                <span id="status-${q.question_id}"></span>
            </div>
        `).join('');
    }

    function selectQuestion(id) {
        if (currentQuestionId) {
            studentAnswers[currentQuestionId] = document.getElementById('editor').value;
        }
        currentQuestionId = id;
        const q = questions.find(item => item.question_id === id);
        document.querySelectorAll('.question-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`item-${id}`).classList.add('active');
        document.getElementById('display-question-title').innerText = q.content;
        document.getElementById('editor').value = studentAnswers[id] || "";
        document.getElementById('editor').focus();
    }

    function markAsDone() {
        if (!currentQuestionId) return;
        studentAnswers[currentQuestionId] = document.getElementById('editor').value;
        document.getElementById(`status-${currentQuestionId}`).innerHTML = "🟢"; 
        const currentIndex = questions.findIndex(q => q.question_id === currentQuestionId);
        if (currentIndex < questions.length - 1) {
            selectQuestion(questions[currentIndex + 1].question_id);
        }
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('time-left').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                submitAll(true);
            }
        }, 1000);
    }

    async function submitAll(isAuto = false) {
        if (!isAuto && !confirm("Bạn có chắc chắn muốn nộp bài?")) return;
        
        clearInterval(timerInterval);
        const currentSessionId = document.getElementById('session_id').value;
        let correctCount = 0;

        for (let q of questions) {
            const answer = studentAnswers[q.question_id] || "";
            try {
                const res = await fetch('/api/check-answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        student_id: studentId,
                        question_id: q.question_id,
                        answer: answer,
                        session_id: currentSessionId // Gửi chuỗi "PHIÊN_xxx" lên server
                    })
                });
                const data = await res.json();
                if (data.correct) correctCount++;
            } catch (e) { console.error("Lỗi chấm câu:", q.question_id); }
        }

        alert(`✅ Nộp bài thành công!\nMã phiên: ${currentSessionId}\nKết quả: ${correctCount}/${questions.length}`);
        window.location.href = "index.html"; 
    }

    window.onload = initSession;
</script>
</body>
</html>
