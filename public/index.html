<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Làm bài - CodeBloom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f4f4; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background: white; height: 100vh; border-right: 2px solid #ddd; padding: 20px; overflow-y: auto; }
        .main-content { padding: 30px; position: relative; opacity: 0.5; pointer-events: none; transition: 0.3s; }
        .main-content.active { opacity: 1; pointer-events: auto; }
        .question-item { 
            cursor: pointer; padding: 15px; border: 1px solid #eee; 
            margin-bottom: 10px; border-radius: 8px; transition: 0.3s; background: #fff;
        }
        .question-item:hover { background: #f0f7ff; transform: translateX(5px); }
        .question-item.active { border-left: 5px solid #28a745; background: #e9f7ef; font-weight: bold; }
        #editor { 
            width: 100%; height: 450px; font-family: 'Consolas', 'Monaco', monospace; 
            padding: 15px; border-radius: 8px; border: 1px solid #ced4da; font-size: 16px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,.075);
        }
        .timer { font-weight: bold; font-size: 1.5rem; color: #dc3545; text-align: right; margin-bottom: 20px; }
        .status-badge { float: right; font-size: 1.2rem; }
        #question-list { display: none; } /* Ẩn câu hỏi khi chưa bắt đầu */
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 sidebar shadow-sm">
            <h5 class="border-bottom pb-2">🧠 CodeBloom Workspace</h5>
            <div class="p-3 bg-light rounded mb-3 mt-3">
                <label class="form-label small fw-bold">MÃ PHIÊN LÀM VIỆC:</label>
                <div class="input-group">
                    <input type="text" id="session_id" class="form-control fw-bold text-primary" readonly>
                    <button class="btn btn-primary" id="btn-start" onclick="startExam()">Bắt đầu</button>
                </div>
                <div id="student-info" class="mt-2 small text-muted">Đang xác thực...</div>
            </div>
            
            <div id="question-list-container">
                <h6 class="text-muted">Danh sách câu hỏi:</h6>
                <div id="question-list">
                    </div>
            </div>
        </div>

        <div class="col-md-9 main-content" id="exam-area">
            <div class="timer">⏳ <span id="time-left">30:00</span></div>
            
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white">
                    <h5 class="mb-0" id="display-question-title">Chọn một câu hỏi từ danh sách bên trái</h5>
                </div>
                <div class="card-body">
                    <textarea id="editor" placeholder="// Nhập câu trả lời hoặc code của bạn tại đây..."></textarea>
                    <div class="mt-3 d-flex justify-content-between">
                        <button class="btn btn-outline-success btn-lg" onclick="markAsDone()">✓ Hoàn thành câu này</button>
                        <button class="btn btn-danger btn-lg px-5" onclick="submitAll()">NỘP BÀI TẤT CẢ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let questions = [];
    let currentQuestionId = null;
    let studentAnswers = {}; 
    let timeLeft = 30 * 60; // 30 phút
    let timerInterval;

    const studentId = localStorage.getItem('student_id') || "HS001";
    const studentName = localStorage.getItem('student_name') || "Học sinh";

    // 1. Tự động lấy số phiên làm việc tiếp theo
    async function initSession() {
        document.getElementById('student-info').innerText = `Học sinh: ${studentName} (${studentId})`;
        try {
            // Gọi API để lấy kết quả cũ của HS này
            const res = await fetch(`/api/admin/results`);
            const allResults = await res.json();
            
            // Lọc các phiên duy nhất của học sinh này
            const userSessions = [...new Set(allResults
                .filter(r => r.student_id === studentId)
                .map(r => r.session_id))];
            
            const nextSessionNum = userSessions.length + 1;
            document.getElementById('session_id').value = `PHIEN_${nextSessionNum}`;
        } catch (err) {
            document.getElementById('session_id').value = `PHIEN_1`;
        }
    }

    // 2. Nút Bắt đầu: Hiện câu hỏi và chạy đồng hồ
    async function startExam() {
        try {
            const res = await fetch('/api/questions');
            questions = await res.json();
            
            // Hiển thị danh sách câu hỏi
            renderQuestionList();
            document.getElementById('question-list').style.display = 'block';
            
            // Kích hoạt vùng làm bài
            document.getElementById('exam-area').classList.add('active');
            document.getElementById('btn-start').disabled = true;
            document.getElementById('session_id').readOnly = true;

            // Chạy đồng hồ
            startTimer();
            
            // Tự động chọn câu đầu tiên
            if(questions.length > 0) selectQuestion(questions[0].question_id);
            
        } catch (err) {
            alert("Không thể kết nối máy chủ để tải đề bài!");
        }
    }

    function renderQuestionList() {
        const listDiv = document.getElementById('question-list');
        listDiv.innerHTML = questions.map(q => `
            <div class="question-item shadow-sm" id="item-${q.question_id}" onclick="selectQuestion('${q.question_id}')">
                <span class="badge bg-secondary me-2">${q.question_id}</span>
                <span id="status-${q.question_id}" class="status-badge"></span>
            </div>
        `).join('');
    }

    function selectQuestion(id) {
        // Lưu code hiện tại của câu cũ trước khi chuyển
        if (currentQuestionId) {
            studentAnswers[currentQuestionId] = document.getElementById('editor').value;
        }

        currentQuestionId = id;
        const q = questions.find(item => item.question_id === id);
        
        document.querySelectorAll('.question-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`item-${id}`).classList.add('active');
        document.getElementById('display-question-title').innerText = q.content;
        
        // Xem lại hoặc xóa sạch (hiển thị code cũ hoặc rỗng)
        document.getElementById('editor').value = studentAnswers[id] || "";
        document.getElementById('editor').focus();
    }

    function markAsDone() {
        if (!currentQuestionId) return;
        studentAnswers[currentQuestionId] = document.getElementById('editor').value;
        document.getElementById(`status-${currentQuestionId}`).innerHTML = "✅";
        // Tự động chuyển sang câu tiếp theo (nếu có) để HS đỡ phải click nhiều
        const currentIndex = questions.findIndex(q => q.question_id === currentQuestionId);
        if (currentIndex < questions.length - 1) {
            selectQuestion(questions[currentIndex + 1].question_id);
        }
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('time-left').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                alert("Hết giờ làm bài! Hệ thống sẽ tự động nộp bài.");
                submitAll(true);
            }
        }, 1000);
    }

    async function submitAll(isAuto = false) {
        if (!isAuto && !confirm("Bạn có chắc chắn muốn kết thúc bài thi và nộp bài?")) return;

        clearInterval(timerInterval);
        const sessionId = document.getElementById('session_id').value;
        
        let correct = 0;
        let wrong = 0;

        // Chấm điểm từng câu đã làm
        for (let q of questions) {
            const answer = studentAnswers[q.question_id] || "";
            try {
                const res = await fetch('/api/check-answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        student_id: studentId,
                        question_id: q.question_id,
                        answer: answer,
                        session_id: sessionId
                    })
                });
                const data = await res.json();
                if (data.correct) correct++; else wrong++;
            } catch (e) { wrong++; }
        }

        const unattempted = questions.length - Object.keys(studentAnswers).length;
        const finalMsg = `📊 KẾT QUẢ PHIÊN: ${sessionId}\n\n✅ Đúng: ${correct}\n❌ Sai/Chưa làm: ${questions.length - correct}\n\nNhấn OK để kết thúc.`;
        
        alert(finalMsg);
        window.location.href = "login.html";
    }

    window.onload = initSession;
</script>
</body>
</html>
